<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Query Layout</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f8fafc;
        padding: 24px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .panel {
        padding: 20px;
        border-radius: 16px;
        background: white;
      }

      @media (max-width: 700px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="panel">Left panel</div>
      <div class="panel">Right panel</div>
    </div>
  </body>
</html>
