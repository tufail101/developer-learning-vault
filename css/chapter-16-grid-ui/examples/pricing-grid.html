<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Grid</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        padding: 32px;
      }

      .pricing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      .card {
        background: white;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
      }
    </style>
  </head>
  <body>
    <section class="pricing-grid">
      <article class="card"><h2>Starter</h2><p>$19</p></article>
      <article class="card"><h2>Pro</h2><p>$49</p></article>
      <article class="card"><h2>Team</h2><p>$99</p></article>
    </section>
  </body>
</html>
