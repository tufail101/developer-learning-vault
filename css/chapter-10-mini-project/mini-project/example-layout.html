<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Section Example</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(180deg, #eff6ff, #ffffff); color: #0f172a; }
      .hero { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .card { background: white; border-radius: 18px; padding: 20px; }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Landing Section</h1>
      <div class="cards">
        <article class="card">Feature 1</article>
        <article class="card">Feature 2</article>
        <article class="card">Feature 3</article>
      </div>
    </section>
  </body>
</html>
