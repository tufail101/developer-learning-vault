<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        background: #111827;
        color: white;
      }

      .links {
        display: flex;
        gap: 16px;
      }

      @media (max-width: 640px) {
        .nav {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .links {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <strong>UI Course</strong>
      <nav class="links">
        <span>Home</span>
        <span>Lessons</span>
        <span>Projects</span>
        <span>Contact</span>
      </nav>
    </header>
  </body>
</html>
