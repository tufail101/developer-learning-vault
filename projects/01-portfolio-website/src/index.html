<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Website</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Frontend Developer</p>
      <h1>Hi, I build clean and friendly web experiences.</h1>
      <p class="intro">
        This starter portfolio shows how to present projects, skills, and a call
        to action in a simple modern layout.
      </p>
    </header>
    <main class="page">
      <section>
        <h2>Skills</h2>
        <div class="grid">
          <article class="card">HTML</article>
          <article class="card">CSS</article>
          <article class="card">JavaScript</article>
        </div>
      </section>
      <section>
        <h2>Projects</h2>
        <div class="grid">
          <article class="card">Portfolio Redesign</article>
          <article class="card">Blog UI</article>
          <article class="card">Dashboard UI</article>
        </div>
      </section>
      <section>
        <h2>Contact</h2>
        <button id="hello-btn">Say Hello</button>
        <p id="hello-message"></p>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
