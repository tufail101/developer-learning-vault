<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card Layout</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; font-family: Arial, sans-serif; }
      .card { width: 300px; padding: 24px; border-radius: 20px; background: white; text-align: center; }
      .avatar { width: 72px; height: 72px; border-radius: 50%; background: #cbd5e1; margin: 0 auto 16px; }
    </style>
  </head>
  <body>
    <article class="card">
      <div class="avatar"></div>
      <h1>Profile Card</h1>
      <p>Simple spacing, colors, and rounded corners already improve the UI.</p>
    </article>
  </body>
</html>
