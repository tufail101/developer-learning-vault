<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Layout Example</title>
    <style>
      body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #f8fafc; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .card { background: white; padding: 20px; border-radius: 18px; }
    </style>
  </head>
  <body>
    <section class="grid">
      <article class="card">Starter</article>
      <article class="card">Pro</article>
      <article class="card">Team</article>
    </section>
  </body>
</html>
