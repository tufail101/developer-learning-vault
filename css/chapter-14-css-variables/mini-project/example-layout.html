<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable-Based Card Example</title>
    <style>
      :root { --brand: #2563eb; --surface: #ffffff; --bg: #eff6ff; --radius: 20px; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--bg); font-family: Arial, sans-serif; }
      .card { padding: 24px; background: var(--surface); border-radius: var(--radius); border: 2px solid var(--brand); }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Themed Card</h1>
      <p>Variables make this easier to update later.</p>
    </article>
  </body>
</html>
