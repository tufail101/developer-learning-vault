<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Layout Example</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        background: #111827;
        color: white;
      }
      .links { display: flex; gap: 16px; }
    </style>
  </head>
  <body>
    <header class="nav">
      <strong>Brand</strong>
      <nav class="links">
        <span>Home</span>
        <span>Features</span>
        <span>Pricing</span>
      </nav>
      <span>Sign Up</span>
    </header>
  </body>
</html>
