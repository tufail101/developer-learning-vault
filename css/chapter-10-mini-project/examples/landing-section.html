<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Section</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #fef3c7, #fff7ed);
        color: #292524;
      }

      .hero {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }

      .card {
        padding: 20px;
        border-radius: 18px;
        background: white;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Build Better Landing Sections</h1>
      <div class="cards">
        <article class="card">Fast</article>
        <article class="card">Readable</article>
        <article class="card">Responsive</article>
      </div>
    </section>
  </body>
</html>
