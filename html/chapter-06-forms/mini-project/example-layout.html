<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop Application</title>
  </head>
  <body>
    <h1>Join Our HTML Workshop</h1>
    <form>
      <label for="applicant-name">Name</label>
      <input id="applicant-name" name="applicant-name" type="text" required />

      <label for="applicant-email">Email</label>
      <input id="applicant-email" name="applicant-email" type="email" required />

      <label for="reason">Why do you want to join?</label>
      <textarea id="reason" name="reason"></textarea>

      <button type="submit">Apply</button>
    </form>
  </body>
</html>
