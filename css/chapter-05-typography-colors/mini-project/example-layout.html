<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Intro Layout</title>
    <style>
      body { margin: 0; font-family: Georgia, serif; background: #fff7ed; color: #292524; }
      .intro { width: min(760px, calc(100% - 32px)); margin: 48px auto; padding: 32px; border-radius: 24px; background: #fffbeb; }
      h1 { color: #9a3412; }
    </style>
  </head>
  <body>
    <section class="intro">
      <p>Editorial UI</p>
      <h1>Typography can carry a huge part of the visual design.</h1>
      <p>Good spacing and a calm palette make content much easier to read.</p>
    </section>
  </body>
</html>
