<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce UI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="shop-hero">
      <p>Spring Collection</p>
      <h1>Minimal essentials for modern desks.</h1>
    </header>
    <main class="shop-page">
      <section class="products">
        <article class="product-card">
          <h2>Desk Lamp</h2>
          <p>$39</p>
        </article>
        <article class="product-card">
          <h2>Keyboard</h2>
          <p>$79</p>
        </article>
        <article class="product-card">
          <h2>Notebook Set</h2>
          <p>$19</p>
        </article>
      </section>
    </main>
  </body>
</html>
