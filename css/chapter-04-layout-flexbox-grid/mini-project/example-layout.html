<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Layout Example</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #e2e8f0; }
      .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
      .sidebar, .content { padding: 24px; }
      .sidebar { background: #0f172a; color: white; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .card { background: white; padding: 20px; border-radius: 18px; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">Menu</aside>
      <main class="content">
        <section class="cards">
          <article class="card">Card 1</article>
          <article class="card">Card 2</article>
          <article class="card">Card 3</article>
        </section>
      </main>
    </div>
  </body>
</html>
