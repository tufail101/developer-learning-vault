<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Themed Pricing Card</title>
    <style>
      :root {
        --bg: #eff6ff;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --brand: #2563eb;
        --radius: 22px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: Arial, sans-serif;
        color: var(--text);
      }

      .card {
        width: 320px;
        padding: 28px;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.12);
      }

      .price {
        font-size: 44px;
        font-weight: 700;
        color: var(--brand);
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <article class="card">
      <p>Starter Plan</p>
      <div class="price">$19</div>
      <p class="muted">Use variables once, style consistently everywhere.</p>
    </article>
  </body>
</html>
