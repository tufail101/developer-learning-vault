<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop UI</title>
  </head>
  <body>
    <ul id="list"></ul>
    <script>
      function createItemText(index) {
        return `Task ${index}`;
      }

      const list = document.querySelector("#list");

      for (let i = 1; i <= 5; i += 1) {
        const item = document.createElement("li");
        item.textContent = createItemText(i);
        list.appendChild(item);
      }
    </script>
  </body>
</html>
