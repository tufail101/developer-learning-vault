<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat UI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="chat-layout">
      <aside class="chat-list">
        <div class="chat-preview">Aarav</div>
        <div class="chat-preview">Maya</div>
      </aside>
      <main class="chat-window">
        <div class="bubble received">Hey, how is your project going?</div>
        <div class="bubble sent">Pretty well. I just finished the layout.</div>
        <form class="composer">
          <input type="text" placeholder="Write a message" />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>
  </body>
</html>
