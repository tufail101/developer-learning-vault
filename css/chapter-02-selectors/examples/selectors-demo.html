<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectors Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
      }

      h1 {
        color: #b45309;
      }

      .card {
        padding: 16px;
        background: #fef3c7;
        border-radius: 12px;
      }

      #featured {
        border: 2px solid #b45309;
      }
    </style>

    <h1>Selectors In Action</h1>
    <div class="card" id="featured">This card uses both a class and an id.</div>
  </body>
</html>
