<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Event Page</title>
  </head>
  <body>
    <h1>Frontend Meetup</h1>
    <img src="https://via.placeholder.com/320x200" alt="People attending a frontend meetup session" />

    <h2>Register</h2>
    <form>
      <label for="attendee-name">Name</label>
      <input id="attendee-name" type="text" />

      <label for="attendee-email">Email</label>
      <input id="attendee-email" type="email" />

      <button type="submit">Register For Event</button>
    </form>
  </body>
</html>
