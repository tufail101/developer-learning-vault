<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Kit</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 32px;
        background: #f8fafc;
      }

      .button {
        padding: 12px 18px;
        border-radius: 999px;
        border: 0;
        background: #1d4ed8;
        color: white;
      }

      .card {
        margin-top: 20px;
        padding: 20px;
        border-radius: 16px;
        background: white;
      }

      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: #dbeafe;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <button class="button">Primary Button</button>
    <div class="card">
      <span class="badge">New</span>
      <p>Reusable component styles save time and keep designs consistent.</p>
    </div>
  </body>
</html>
