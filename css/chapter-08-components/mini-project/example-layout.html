<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Library Layout</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; padding: 24px; }
      .button { padding: 12px 18px; border-radius: 999px; background: #2563eb; color: white; display: inline-block; }
      .card { margin-top: 20px; padding: 24px; border-radius: 18px; background: white; }
    </style>
  </head>
  <body>
    <span class="button">Primary Action</span>
    <article class="card">
      <h1>Reusable Card</h1>
      <p>The same component patterns should work in multiple places.</p>
    </article>
  </body>
</html>
