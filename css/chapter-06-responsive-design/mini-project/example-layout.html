<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Landing Example</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .hero { width: min(1000px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .visual { min-height: 220px; border-radius: 24px; background: #bfdbfe; }
      @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <section class="hero">
      <div>
        <h1>Responsive landing section</h1>
        <p>This should stack cleanly on smaller screens.</p>
      </div>
      <div class="visual"></div>
    </section>
  </body>
</html>
