<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Widgets</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #e2e8f0;
        padding: 24px;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      .widget {
        min-height: 120px;
        background: white;
        border-radius: 18px;
        padding: 20px;
      }

      @media (max-width: 800px) {
        .dashboard {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <section class="dashboard">
      <article class="widget">Visitors</article>
      <article class="widget">Revenue</article>
      <article class="widget">Tasks</article>
      <article class="widget">Messages</article>
    </section>
  </body>
</html>
