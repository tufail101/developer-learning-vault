<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Section Example</title>
  </head>
  <body>
    <header>
      <h1>Student Developer Portfolio</h1>
      <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>
    <main>
      <section id="about">
        <h2>About</h2>
        <p>I am learning web development step by step.</p>
      </section>
      <section id="projects">
        <h2>Projects</h2>
        <ul>
          <li>Profile Page</li>
          <li>Blog Layout</li>
        </ul>
      </section>
      <section id="contact">
        <h2>Contact</h2>
        <form>
          <label for="email">Email</label>
          <input id="email" type="email" />
          <button type="submit">Connect</button>
        </form>
      </section>
    </main>
  </body>
</html>
