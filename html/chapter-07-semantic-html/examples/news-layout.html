<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic News Layout</title>
  </head>
  <body>
    <header>
      <h1>Frontend Weekly</h1>
      <nav>
        <a href="#latest">Latest</a>
        <a href="#guides">Guides</a>
      </nav>
    </header>

    <main>
      <article id="latest">
        <h2>Semantic HTML Makes Pages Clearer</h2>
        <p>Choosing meaningful tags helps both people and tools understand your page.</p>
      </article>
    </main>

    <footer>
      <p>Thanks for reading.</p>
    </footer>
  </body>
</html>
