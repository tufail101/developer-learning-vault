<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Hero</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #eff6ff, #ffffff);
        color: #0f172a;
      }

      .hero {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 24px;
        align-items: center;
      }

      .visual {
        min-height: 280px;
        border-radius: 24px;
        background: linear-gradient(135deg, #bfdbfe, #60a5fa);
      }

      .cta {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        background: #2563eb;
        color: white;
      }

      @media (max-width: 780px) {
        .hero {
          grid-template-columns: 1fr;
          padding: 40px 0;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div>
        <p>Responsive UI</p>
        <h1>Build layouts that feel calm on every screen size.</h1>
        <p>Desktop and mobile should both feel intentional, not accidental.</p>
        <span class="cta">Start Learning</span>
      </div>
      <div class="visual"></div>
    </section>
  </body>
</html>
