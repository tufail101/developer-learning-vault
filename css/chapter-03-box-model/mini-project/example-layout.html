<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Card Layout</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; font-family: Arial, sans-serif; }
      .card { width: 320px; padding: 28px; border: 1px solid #cbd5e1; border-radius: 22px; background: white; }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Starter</h1>
      <p>$19 / month</p>
      <p>Spacing and borders do most of the visual work here.</p>
    </article>
  </body>
</html>
