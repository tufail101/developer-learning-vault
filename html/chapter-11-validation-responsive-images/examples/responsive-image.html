<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Image Example</title>
  </head>
  <body>
    <h1>Responsive Image Demo</h1>
    <img
      src="https://via.placeholder.com/480x280"
      srcset="
        https://via.placeholder.com/480x280 480w,
        https://via.placeholder.com/800x460 800w,
        https://via.placeholder.com/1200x680 1200w
      "
      sizes="(max-width: 600px) 100vw, 800px"
      alt="Placeholder image used to demonstrate responsive image behavior"
    />
  </body>
</html>
